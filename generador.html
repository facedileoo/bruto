<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Generador de Rutinas</title>
        <link rel="stylesheet" href="style/style.css">
        <link rel="stylesheet" href="style/Generador.css">
    </head>
    <body>
        <header>
            <h1>Generador de Rutinas </h1>
        </header>
        <section></section>
        <main>
            <section class="rutina">
            </section>
            <section class="form">
                <form id="formRutina">

                <label for="edad">Edad</label>
                <input type="number" id="edad" min="12" max="100" required>

                <label for="peso">Peso</label>
                <input type="number" id="peso" min="30" required>

                <label for="altura">Altura</label>
                <input type="number" id="altura" min="100" required>

                <label for="objetivo">Objetivo</label>
                <select id="objetivo" required>
                <option value="">Seleccionar</option>
                <option value="fuerza">Fuerza</option>
                <option value="musculo">Ganar músculo</option>
                <option value="grasa">Perder grasa</option>
                </select>

                <label for="nivel">Nivel</label>
                <select id="nivel" required>
                <option value="">Seleccionar</option>
                <option value="principiante">Principiante</option>
                <option value="intermedio">Intermedio</option>
                <option value="avanzado">Avanzado</option>
                </select>

                <label for="lugar">Lugar</label>
                <select id="lugar" required>
                <option value="">Seleccionar</option>
                <option value="gimnasio">Gimnasio</option>
                <option value="casa">Casa</option>
                <option value="calistenia">Parque</option>
                </select>

                <label for="dias">Días por semana</label>
                <input type="number" id="dias" min="1" max="6" required>

                <label for="tiempo">Tiempo por sesión (min)</label>
                <input type="number" id="tiempo" min="30" max="180" step="5" required>

                <button type="submit">Generar Rutina</button>

                </form>
        </section>

    </main> 
    <footer>
        <nav>
            <a href="rango.html">Rango</a>
            <a href="generador.html">Generador de Rutina</a>
            <a href="miRutina.html">Mi Rutina</a>
            <a href="index.html">Mi Perfil</a>
        </nav>
    </footer>
<script src="js/Generador.js"></script>
</body>
</html>
